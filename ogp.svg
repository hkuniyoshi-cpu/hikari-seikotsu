  <text x="124" y="296" font-family="Noto Sans JP, Hiragino Sans, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.88)" letter-spacing="4">からだにひかりを</text>

  <rect x="120" y="330" width="120" height="4" rx="2" fill="#FFD54F" opacity="0.9"/>

