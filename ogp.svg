      <rect x="-175" y="-9" width="52" height="18" rx="9"/>
      <rect x="123"  y="-9" width="52" height="18" rx="9"/>
      <rect x="-9" y="-175" width="18" height="52" rx="9" transform="rotate(45)"/>
      <rect x="-9" y="123"  width="18" height="52" rx="9" transform="rotate(45)"/>
      <rect x="-175" y="-9" width="52" height="18" rx="9" transform="rotate(45)"/>
