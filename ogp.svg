    <path d="M-32,20 Q0,46 32,20" stroke="#FFF5E0" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
    <circle cx="-22" cy="-5" r="8" fill="#FFF5E0" opacity="0.9"/>
    <circle cx="22"  cy="-5" r="8" fill="#FFF5E0" opacity="0.9"/>
    <circle cx="-22" cy="-5" r="4" fill="#FF7043"/>
